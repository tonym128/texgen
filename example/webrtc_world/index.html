<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TexGen WebRTC World</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #111; color: #eee; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #ui-layer > * { pointer-events: auto; }
        
        #lobby { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 20px; border: 1px solid #444; border-radius: 8px; text-align: center; z-index: 100; }
        #lobby h1 { margin-top: 0; color: #0f8; }
        #lobby input { padding: 10px; width: 200px; background: #222; border: 1px solid #444; color: #fff; border-radius: 4px; }
        #lobby button { padding: 10px 20px; background: #0f8; border: none; color: #000; font-weight: bold; cursor: pointer; border-radius: 4px; }
        #lobby button:hover { background: #0c6; }
        
        #hud { display: none; }
        #minimap-container { position: absolute; top: 20px; right: 20px; border: 2px solid #444; background: rgba(0,0,0,0.5); }
        #minimap { width: 150px; height: 150px; }
        
        #chat { position: absolute; bottom: 20px; left: 20px; width: 300px; height: 200px; background: rgba(0,0,0,0.5); display: flex; flex-direction: column; border: 1px solid #444; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 5px; font-size: 14px; }
        #chat-input { background: #222; border: none; border-top: 1px solid #444; padding: 8px; color: #fff; }
        
        #stats { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.5); padding: 10px; font-size: 12px; border: 1px solid #444; pointer-events: none; }
        #network-graph { width: 200px; height: 60px; background: #000; margin-top: 5px; }
        
        #console-log { position: absolute; bottom: 20px; right: 20px; width: 300px; height: 150px; background: rgba(0,0,0,0.8); border: 1px solid #444; font-family: monospace; font-size: 11px; overflow-y: auto; padding: 5px; color: #aaa; }
        .log-msg { margin-bottom: 2px; }
        .log-net { color: #0af; }
        .log-sys { color: #fa0; }
        
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; display: none; }

        .mobile-controls { position: absolute; bottom: 20px; right: 20px; display: none; }
        @media (pointer: coarse) { .mobile-controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; } }
        .mbtn { width: 60px; height: 60px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>
    <canvas id="webgl-canvas"></canvas>

    <div id="ui-layer">
        <div id="lobby">
            <h1>TexGen World</h1>
            <p>Join or Host a WebRTC World</p>
            <div id="lobby-view">
                <input type="text" id="username-input" placeholder="Your Name" value="Player"><br><br>
                <input type="text" id="avatar-words" placeholder="Avatar (e.g. red metal)" value="blue plastic"><br><br>
                <input type="text" id="world-id-input" placeholder="World ID (empty to host)"><br><br>
                <button id="join-btn">START</button>
            </div>
            <div id="connection-status" style="margin-top: 10px; font-size: 12px; color: #888;"></div>
        </div>

        <div id="hud">
            <div id="stats">
                <div>Players: <span id="player-count">1</span></div>
                <div>Ping: <span id="ping-val">0</span>ms</div>
                <div style="color: #0af">Graphical: <span id="net-graphical">0</span> KB</div>
                <div style="color: #0f8; font-size: 10px; margin-left: 10px;">Uncompressed: <span id="net-uncompressed">0</span> KB</div>
                <div style="color: #0f8; font-size: 10px; margin-left: 10px;">Saved: <span id="net-savings">0</span>%</div>
                <div style="color: #fa0">Positional: <span id="net-positional">0</span> KB</div>
                <canvas id="network-graph"></canvas>
            </div>

            <div id="minimap-container">
                <canvas id="minimap" width="150" height="150"></canvas>
            </div>

            <div id="chat">
                <div id="chat-messages"></div>
                <input type="text" id="chat-input" placeholder="Press Enter to talk...">
            </div>

            <div id="console-log"></div>
        </div>

        <div id="loading">Generating World...</div>
    </div>

    <!-- Scripts -->
    <script type="importmap">
        {
          "imports": {
            "three": "https://ga.jspm.io/npm:three@0.160.0/build/three.module.js"
          }
        }
    </script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="texgen.js"></script>
    <script src="../../src/texgen.words.js"></script>
    <script type="module">
        import * as THREE from 'three';
        window.THREE = THREE;
    </script>
    <script src="game.js"></script>
</body>
</html>
