<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TexGen - Procedural Texture Generator</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --panel-bg: #2d2d2d;
            --text-color: #d4d4d4;
            --border-color: #444;
            --accent-color: #007acc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #editor-panel {
            width: 40%;
            min-width: 350px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            background-color: var(--panel-bg);
        }

        .header {
            padding: 10px 15px;
            background-color: #252526;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .header h1 {
            margin: 0;
            font-size: 16px;
            font-weight: normal;
            white-space: nowrap;
        }

        #compile-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
        }
        
        #compile-btn:hover {
            background-color: #0098ff;
        }

        #example-select {
            background-color: #3c3c3c;
            color: white;
            border: 1px solid var(--border-color);
            padding: 4px;
            border-radius: 3px;
            font-size: 12px;
            outline: none;
            flex-grow: 1;
        }

        .tool-bar {
            padding: 5px 15px;
            background-color: #333;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid var(--border-color);
            align-items: center;
            flex-wrap: wrap;
        }

        .tool-btn {
            background-color: transparent;
            color: #ccc;
            border: 1px solid #555;
            padding: 4px 10px;
            font-size: 11px;
            cursor: pointer;
            border-radius: 2px;
            white-space: nowrap;
        }

        .tool-btn:hover {
            background-color: #444;
            color: white;
        }

        .tool-btn.danger:hover {
            background-color: #a1260d;
        }

        #texture-name {
            background-color: #1e1e1e;
            color: white;
            border: 1px solid #555;
            padding: 3px 8px;
            font-size: 11px;
            border-radius: 2px;
            width: 120px;
        }

        #sliders-panel {
            padding: 10px 15px;
            background-color: #252526;
            border-bottom: 1px solid var(--border-color);
            display: none;
            flex-direction: column;
            gap: 10px;
            max-height: 150px;
            overflow-y: auto;
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
        }

        .slider-row label {
            width: 80px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .slider-row input[type="range"] {
            flex-grow: 1;
        }

        .slider-row .slider-val {
            width: 40px;
            text-align: right;
            font-family: monospace;
        }

        #editor-wrapper {
            flex-grow: 1;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        textarea {
            flex-grow: 1;
            width: 100%;
            box-sizing: border-box;
            background-color: #1e1e1e;
            color: #d4d4d4;
            border: none;
            padding: 15px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            resize: none;
            outline: none;
            white-space: pre;
            overflow-wrap: normal;
            overflow-x: auto;
        }

        #error-log {
            height: 120px;
            background-color: #2d2d2d;
            border-top: 1px solid var(--border-color);
            padding: 10px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            color: #ccc;
            overflow-y: auto;
            box-sizing: border-box;
            white-space: pre-wrap;
        }

        #visualization-panel {
            flex-grow: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 1px;
            background-color: var(--border-color);
        }

        .view-container {
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .view-container.view-2d {
            grid-column: 1 / -1;
        }

        .view-title {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            z-index: 10;
            pointer-events: none;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .canvas-container {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }

        /* Modal / Gallery */
        #gallery-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        #gallery-modal {
            background: var(--panel-bg);
            width: 85%;
            height: 85%;
            border-radius: 8px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            overflow-y: auto;
            flex-grow: 1;
            padding: 10px;
        }

        .gallery-item {
            cursor: pointer;
            border: 2px solid #444;
            border-radius: 6px;
            background: #252526;
            transition: all 0.2s;
            text-align: center;
            padding: 10px;
        }

        .gallery-item:hover {
            border-color: var(--accent-color);
            transform: translateY(-2px);
            background: #2d2d2d;
        }

        .gallery-item img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 4px;
            display: block;
            background: #111;
        }

        .gallery-item span {
            font-size: 12px;
            margin-top: 8px;
            display: block;
            color: #eee;
        }

        /* Toast Notifications */
        #toast-container {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .toast {
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 13px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            border-left: 5px solid var(--accent-color);
            animation: toast-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-width: 250px;
        }

        @keyframes toast-in {
            from { transform: translateX(110%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .toast.success { border-left-color: #89d185; }
        .toast.error { border-left-color: #f48771; }
        .toast.info { border-left-color: #007acc; }

        .CodeMirror { height: 100%; flex-grow: 1; font-family: 'Consolas', 'Monaco', 'Courier New', monospace; font-size: 14px; z-index: 1;}
        input[type="color"] { border: none; padding: 0; width: 24px; height: 24px; cursor: pointer; background: transparent;}
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 1px solid #555; border-radius: 2px; }

    </style>
    <!-- JSZip -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- CodeMirror -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/stats.js/16/Stats.min.js"></script>
</head>

    <script>
        // --- Library Data ---
        const UTILS = `// --- Utility Functions ---
uniform float u_seed;
float random (in vec2 st) {
    return fract(sin(dot(st.xy + u_seed, vec2(12.9898,78.233))) * 43758.5453123);
}

// Seamless Tiling Noise
float noise(vec2 st, float p) {
    vec2 i = floor(st);
    vec2 f = fract(st);
    vec2 i0 = mod(i, p);
    vec2 i1 = mod(i + 1.0, p);
    float a = random(i0);
    float b = random(vec2(i1.x, i0.y));
    float c = random(vec2(i0.x, i1.y));
    float d = random(i1);
    vec2 u = f*f*(3.0-2.0*f);
    return mix(a, b, u.x) + (c - a)* u.y * (1.0 - u.x) + (d - b) * u.x * u.y;
}

float fbm(vec2 st, float p) {
    float v = 0.0;
    float a = 0.5;
    for (int i = 0; i < 5; i++) {
        v += a * noise(st, p);
        st *= 2.0;
        p *= 2.0;
        a *= 0.5;
    }
    return v;
}

// --- Voronoi & Cellular Noise ---
vec2 hash22(vec2 p) {
    p = vec2(dot(p,vec2(127.1,311.7)), dot(p,vec2(269.5,183.3)));
    return fract(sin(p)*43758.5453123);
}

float voronoi(vec2 x) {
    vec2 n = floor(x);
    vec2 f = fract(x);
    float m_dist = 1.0;
    for(int j=-1; j<=1; j++) {
        for(int i=-1; i<=1; i++) {
            vec2 g = vec2(float(i),float(j));
            vec2 o = hash22(n + g);
            vec2 r = g + o - f;
            float d = dot(r,r);
            if(d < m_dist) m_dist = d;
        }
    }
    return sqrt(m_dist);
}

// Shape Helpers
float sdCircle(vec2 p, float r) {
    return length(p) - r;
}

float sdBox(vec2 p, vec2 b) {
    vec2 d = abs(p) - b;
    return length(max(d, 0.0)) + min(max(d.x, d.y), 0.0);
}

// --- PBR & Bump Mapping Helpers ---
struct PBRData {
    vec3 albedo;
    float roughness;
    float metallic;
    float ambientOcclusion;
    vec3 normal;
};

// Calculate normal from a scalar height value using screen-space derivatives
vec3 calculateNormal(float height, float strength) {
    vec3 normal = vec3(dFdx(height), dFdy(height), 0.01 / strength);
    return normalize(normal);
}

// Simple PBR Lighting approximation for preview
vec3 applyPBRLighting(PBRData pbr, vec3 lightDir, vec3 viewDir, vec3 lightCol) {
    if (u_bakeMode == 1) return pbr.albedo;
    if (u_bakeMode == 2) return pbr.normal * 0.5 + 0.5;
    if (u_bakeMode == 3) return vec3(pbr.roughness);
    if (u_bakeMode == 4) return vec3(pbr.metallic);
    if (u_bakeMode == 5) return vec3(pbr.ambientOcclusion);

    vec3 N = pbr.normal;
    vec3 V = viewDir;
    vec3 L = normalize(lightDir);
    vec3 H = normalize(V + L);

    float dotNH = max(dot(N, H), 0.0);
    float dotNV = max(dot(N, V), 0.0);
    float dotNL = max(dot(N, L), 0.0);

    // Fresnel (Schlick)
    vec3 F0 = mix(vec3(0.04), pbr.albedo, pbr.metallic);
    vec3 F = F0 + (1.0 - F0) * pow(1.0 - max(dot(H, V), 0.0), 5.0);

    // Specular (Cook-Torrance DNDF approximation)
    float alpha = pbr.roughness * pbr.roughness;
    float D = alpha / (3.14159 * pow(dotNH * dotNH * (alpha - 1.0) + 1.0, 2.0));
    
    // Geometry (Smith)
    float k = alpha * 0.5;
    float G = (dotNL / (dotNL * (1.0 - k) + k)) * (dotNV / (dotNV * (1.0 - k) + k));

    vec3 specular = (D * F * G) / (4.0 * dotNL * dotNV + 0.001);
    vec3 diffuse = (1.0 - F) * (1.0 - pbr.metallic) * pbr.albedo / 3.14159;

    return (diffuse + specular) * lightCol * dotNL + pbr.albedo * 0.05 * pbr.ambientOcclusion;
}
`;

                const shaders = {
            island: `void main() {
    float scale = 4.0;
    vec2 st = vUv * scale;
    float n = fbm(st + u_time * 0.05, scale);
    vec3 water = vec3(0.0, 0.2, 0.5);

        // --- Persistence Logic ---
        const CUSTOM_STORAGE_KEY = 'texgen_custom_textures';
        
        function getCustomTextures() {
            const data = localStorage.getItem(CUSTOM_STORAGE_KEY);
            return data ? JSON.parse(data) : {};
        }

        function saveCustomTexture(name, code) {
            const textures = getCustomTextures();
            textures[name] = {
                code: code,
                date: new Date().toISOString()
            };
            localStorage.setItem(CUSTOM_STORAGE_KEY, JSON.stringify(textures));
        }

        function deleteCustomTexture(name) {
            const textures = getCustomTextures();
            delete textures[name];
            localStorage.setItem(CUSTOM_STORAGE_KEY, JSON.stringify(textures));
        }

        // --- Compression ---
        const TOKEN_MAP = {
            'void main()': '§m', 'gl_FragColor': '§f', 'vec2': '§2', 'vec3': '§3', 'vec4': '§4', 'float': '§l',
            'uniform': '§u', 'varying': '§v', 'u_time': '§t', 'vUv': '§U', 'fbm': '§b', 'noise': '§n',
            'random': '§r', 'smoothstep': '§s', 'mix': '§x', 'fract': '§c', 'floor': '§o', 'distance': '§d', 'length': '§g'
        };

        const compressShader = (code) => {
            let compressed = code.replace(/\/\/.*$/gm, '').replace(/\s+/g, ' ').trim();
            for (const [token, replacement] of Object.entries(TOKEN_MAP)) {
                compressed = compressed.split(token).join(replacement);
            }
            return btoa(compressed);
        };

        const decompressShader = (base64) => {
            try {
                let decompressed = atob(base64);
                for (const [token, replacement] of Object.entries(TOKEN_MAP)) {
                    decompressed = decompressed.split(replacement).join(token);
                }
                return decompressed;
            } catch(e) { return null; }
        };

        // --- Shared WebGL for Baking ---
        let _sharedGL = null;
        let _sharedCanvas = null;
        window._currentSeed = 0.0;

        const TextureEngine = {
            bake: (shaderCode, width = 512, height = 512, time = 0, bakeMode = 0) => {
                if (!_sharedCanvas) {
                    _sharedCanvas = document.createElement('canvas');
                    _sharedGL = _sharedCanvas.getContext('webgl', { preserveDrawingBuffer: true });
                }
                const gl = _sharedGL;
                if (!gl) return null;
                gl.getExtension('OES_standard_derivatives');
                _sharedCanvas.width = width;
                _sharedCanvas.height = height;
                gl.viewport(0, 0, width, height);
                
                const needsUtils = !shaderCode.includes('float random');
                const vsSrc = `attribute vec2 p;varying vec2 vUvRaw;void main(){vUvRaw=p*0.5+0.5;gl_Position=vec4(p,0,1);}`;
                                const fsSrc = `#extension GL_OES_standard_derivatives : enable
precision mediump float;
uniform float u_time;
uniform vec2 u_resolution;
uniform vec3 u_lightDir;
uniform vec3 u_viewDir;
uniform sampler2D u_tex0;
uniform int u_bakeMode;
uniform float u_seed;
varying vec2 vUvRaw;
#define vUv fract(vUvRaw)
${needsUtils ? UTILS.replace('uniform float u_seed;', '') : ''}
${shaderCode}`;

                const createShader = (type, src) => {
                    const s = gl.createShader(type);
                    gl.shaderSource(s, src);
                    gl.compileShader(s);
                    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) return null;
                    return s;
                };
                
                const vs = createShader(gl.VERTEX_SHADER, vsSrc);
                const fs = createShader(gl.FRAGMENT_SHADER, fsSrc);
                if(!fs) return null;

                const program = gl.createProgram();
                gl.attachShader(program, vs);
                gl.attachShader(program, fs);
                gl.linkProgram(program);
                gl.useProgram(program);
                
                const buffer = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
                gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
                const pLoc = gl.getAttribLocation(program, 'p');
                if(pLoc !== -1) {
                    gl.enableVertexAttribArray(pLoc);
                    gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);
                }
                
                gl.uniform1f(gl.getUniformLocation(program, 'u_time'), time);
                gl.uniform2f(gl.getUniformLocation(program, 'u_resolution'), width, height);
                gl.uniform3f(gl.getUniformLocation(program, 'u_lightDir'), 1.0, 1.0, 1.0);
                gl.uniform3f(gl.getUniformLocation(program, 'u_viewDir'), 0.0, 0.0, 1.0);
                gl.uniform1i(gl.getUniformLocation(program, 'u_bakeMode'), bakeMode);
                gl.uniform1f(gl.getUniformLocation(program, 'u_seed'), window._currentSeed);

                const texLoc = gl.getUniformLocation(program, 'u_tex0');
                if(texLoc !== null && window._uploadedImageElement) {
                    const t = gl.createTexture();
                    gl.activeTexture(gl.TEXTURE0);
                    gl.bindTexture(gl.TEXTURE_2D, t);
                    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, window._uploadedImageElement);
                    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
                    gl.uniform1i(texLoc, 0);
                }

                for(const key in window._dynamicUniforms) {
                    const loc = gl.getUniformLocation(program, key);
                    if(loc !== null) {
                        const val = window._dynamicUniforms[key];
                        if(typeof val === 'object' && val.isColor) gl.uniform3f(loc, val.r, val.g, val.b);
                        else if (typeof val === 'number') gl.uniform1f(loc, val);
                    }
                }

                gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                const dataUrl = _sharedCanvas.toDataURL();
                gl.deleteProgram(program); gl.deleteShader(vs); gl.deleteShader(fs); gl.deleteBuffer(buffer);
                return dataUrl;

                        if(v.uniforms.u_seed) v.uniforms.u_seed.value = window._currentSeed;
                    });
                    showToast("Seed Randomized!", "info");
                };
            }

            // --- Recording Logic ---
            let mediaRecorder;
            let recordedChunks = [];
            const recordBtn = document.getElementById('record-btn');
            if(recordBtn) {
                recordBtn.onclick = () => {
                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                        recordBtn.innerText = '⏺ Record (WebM)';
                        recordBtn.style.color = '#f44336';
                        showToast("Recording Stopped, Saving...", "info");
                    } else {
                        const canvas = document.querySelector('#view-cube canvas');
                        if(!canvas) return;
                        const stream = canvas.captureStream(30);
                        try {
                            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                        } catch (e) { mediaRecorder = new MediaRecorder(stream); }
                        
                        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
                        mediaRecorder.onstop = () => {
                            const blob = new Blob(recordedChunks, { type: 'video/webm' });
                            const url = URL.createObjectURL(blob);
                            const a = document.createElement('a'); a.href = url; a.download = 'texgen_capture.webm'; a.click();
                            recordedChunks = [];
                            URL.revokeObjectURL(url);
                        };
                        mediaRecorder.start();
                        recordBtn.innerText = '⏹ Stop Recording';
                        recordBtn.style.color = '#ffffff';
                        recordBtn.style.backgroundColor = '#f44336';
                        showToast("Recording Started...", "success");
                    }
                };
            }

            // CodeMirror Init
            const textarea = document.getElementById('shader-code');
            const editor = CodeMirror.fromTextArea(textarea, {
                mode: "text/x-csrc", theme: "monokai", lineNumbers: true, matchBrackets: true, indentUnit: 4,
                extraKeys: { "Ctrl-Enter": function(cm) { compileShader(); } }
            });

            const vertexShaderCode = `
                varying vec2 vUvRaw;
                uniform vec2 u_uvScale;
                void main() {
                    vUvRaw = uv * u_uvScale;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `;

            function createScene(containerId, is3D, uvScale) {
                const container = document.getElementById(containerId);
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setPixelRatio(window.devicePixelRatio);
                container.appendChild(renderer.domElement);
                const scene = new THREE.Scene();
                if(is3D) scene.background = new THREE.Color(0x222222);
                else {
                    container.style.backgroundImage = "linear-gradient(45deg, #333 25%, transparent 25%), linear-gradient(-45deg, #333 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #333 75%), linear-gradient(-45deg, transparent 75%, #333 75%)";
                    container.style.backgroundSize = "20px 20px";
                }
                
                let camera;
                if (is3D) {
                    camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 100);
                    camera.position.z = 2.5;
                    if(containerId === 'view-wall') camera.position.z = 1.2;
                } else {
                    const aspect = container.clientWidth / container.clientHeight;
                    camera = new THREE.OrthographicCamera(-aspect, aspect, 1, -1, 0.1, 10);
                    camera.position.z = 1;
                }
                const uniforms = {
                    u_time: { value: 0.0 },
                    u_resolution: { value: new THREE.Vector2(container.clientWidth, container.clientHeight) },
                    u_uvScale: { value: new THREE.Vector2(uvScale, uvScale) },
                    u_lightDir: { value: new THREE.Vector3(1, 1, 1).normalize() },
                    u_viewDir: { value: new THREE.Vector3(0, 0, 1) },
                    u_tex0: { value: null },
                    u_bakeMode: { value: 0 },
                    u_seed: { value: window._currentSeed }
                };
                const material = new THREE.ShaderMaterial({
                    vertexShader: vertexShaderCode,
                    fragmentShader: 'void main(){gl_FragColor=vec4(0,0,0,1);}',
                    uniforms: uniforms, transparent: true, extensions: { derivatives: true }
                });
                materials.push(material);
                
                const meshes = {
                    cube: new THREE.BoxGeometry(1, 1, 1),
                    sphere: new THREE.SphereGeometry(0.7, 64, 64),
                    cylinder: new THREE.CylinderGeometry(0.5, 0.5, 1.2, 64),
                    torus: new THREE.TorusGeometry(0.5, 0.2, 32, 100),
                    plane: new THREE.PlaneGeometry(1.5, 1.5)
                };

                let mesh = new THREE.Mesh(containerId === 'view-cube' ? meshes.cube : (containerId === 'view-wall' ? new THREE.PlaneGeometry(2,2) : new THREE.PlaneGeometry(1.8, 1.8)), material);
                scene.add(mesh);

                const resize = () => {
                    const w = container.clientWidth, h = container.clientHeight;
                    renderer.setSize(w, h, false);
                    uniforms.u_resolution.value.set(w, h);
                    if (is3D) { camera.aspect = w / h; camera.updateProjectionMatrix(); }
                    else { const a = w / h; camera.left = -a; camera.right = a; camera.updateProjectionMatrix(); }
                };
                window.addEventListener('resize', resize);
                new ResizeObserver(resize).observe(container);
                resize();
                return { renderer, scene, camera, mesh, uniforms, containerId, meshes };
            }

            const views = [
                createScene('view-2d', false, 1.0),
                createScene('view-cube', true, 1.0),
                createScene('view-wall', true, 3.0)
            ];

            function animate() {
                if(stats) stats.begin();
                requestAnimationFrame(animate);
                const elapsedTime = clock.getElapsedTime();
                views.forEach(v => {
                    v.uniforms.u_time.value = elapsedTime;
                    v.uniforms.u_lightDir.value.set(Math.sin(elapsedTime * 0.5), Math.cos(elapsedTime * 0.5), 1.0).normalize();
                    if (v.containerId === 'view-cube') {
                        v.mesh.rotation.x = elapsedTime * 0.3;
                        v.mesh.rotation.y = elapsedTime * 0.5;
                    }
                    v.renderer.render(v.scene, v.camera);
                });
                if(stats) stats.end();
            }
            animate();

            const toastContainer = document.getElementById('toast-container');
            const errorLog = document.getElementById('error-log');
            const compileBtn = document.getElementById('compile-btn');
            const exampleSelect = document.getElementById('example-select');
            const galleryBtn = document.getElementById('gallery-btn');
            const myTexturesBtn = document.getElementById('my-textures-btn');
            const meshSelect = document.getElementById('mesh-select');
            const imageUpload = document.getElementById('image-upload');
            const saveBtn = document.getElementById('save-btn');
            const textureNameInput = document.getElementById('texture-name');
            const exportStorageBtn = document.getElementById('export-storage-btn');
            const importStorageBtn = document.getElementById('import-storage-btn');
            const galleryTitle = document.getElementById('gallery-title');
            const galleryOverlay = document.getElementById('gallery-overlay');
            const galleryGrid = document.getElementById('gallery-grid');
            const closeGallery = document.getElementById('close-gallery');
            const compressBtn = document.getElementById('compress-btn');
            const bakeBtn = document.getElementById('bake-btn');
            const bakePbrBtn = document.getElementById('bake-pbr-btn');
            const bakeSpritesBtn = document.getElementById('bake-sprites-btn');

            function showToast(message, type = 'info') {
                const t = document.createElement('div');
                t.className = `toast ${type}`;
                t.innerText = message;
                toastContainer.appendChild(t);
                setTimeout(() => {
                    t.style.opacity = '0'; t.style.transform = 'translateX(100%)'; t.style.transition = 'all 0.3s ease-in';
                    setTimeout(() => t.remove(), 300);
                }, 3000);
            }

            meshSelect.onchange = (e) => {
                const val = e.target.value;
                const view = views.find(v => v.containerId === 'view-cube');
                if(view) view.mesh.geometry = view.meshes[val];
            };

            imageUpload.onchange = (e) => {
                const file = e.target.files[0];
                if(file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            window._uploadedImageElement = img;
                            window._uploadedImageTexture = new THREE.Texture(img);
                            window._uploadedImageTexture.needsUpdate = true;
                            materials.forEach(m => { m.uniforms.u_tex0.value = window._uploadedImageTexture; });
                            compileShader();
                            showToast("Image loaded!", "success");
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            };

            function applyDynamicUniformsToMaterials() {
                materials.forEach(m => {
                    for(const key in window._dynamicUniforms) {
                        const v = window._dynamicUniforms[key];
                        if (typeof v === 'object' && v.isColor) {
                            if (!m.uniforms[key]) m.uniforms[key] = { value: new THREE.Color() };
                            m.uniforms[key].value.setRGB(v.r, v.g, v.b);
                        } else {
                            if (!m.uniforms[key]) m.uniforms[key] = { value: v };
                            m.uniforms[key].value = v;
                        }
                    }
                });
            }

            function updateSliders(code) {
                const panel = document.getElementById('sliders-panel');
                panel.innerHTML = '';
                window._dynamicUniforms = {};
                let hasSliders = false;
                const floatRegex = /uniform\s+float\s+(\w+);\s*\/\/\s*@slider\s*([\d\.-]+)\s*,\s*([\d\.-]+)\s*,\s*([\d\.-]+)/g;
                let match;
                while ((match = floatRegex.exec(code)) !== null) {
                    hasSliders = true;
                    const name = match[1], min = parseFloat(match[2]), max = parseFloat(match[3]), val = parseFloat(match[4]);
                    window._dynamicUniforms[name] = val;
                    const container = document.createElement('div'); container.className = 'slider-row';
                    container.innerHTML = `<label>${name}</label><input type="range" min="${min}" max="${max}" step="0.01" value="${val}"><span>${val}</span>`;
                    const input = container.querySelector('input'), span = container.querySelector('span');
                    input.oninput = (e) => {
                        const v = parseFloat(e.target.value); window._dynamicUniforms[name] = v; span.innerText = v;
                        applyDynamicUniformsToMaterials();
                    };
                    panel.appendChild(container);
                }
                const colorRegex = /uniform\s+vec3\s+(\w+);\s*\/\/\s*@color\s+(#[0-9a-fA-F]{6})/g;
                while ((match = colorRegex.exec(code)) !== null) {
                    hasSliders = true;
                    const name = match[1], hex = match[2];
                    const color = new THREE.Color(hex);
                    window._dynamicUniforms[name] = { isColor: true, r: color.r, g: color.g, b: color.b };
                    const container = document.createElement('div'); container.className = 'slider-row';
                    container.innerHTML = `<label>${name}</label><input type="color" value="${hex}">`;
                    const input = container.querySelector('input');
                    input.oninput = (e) => {
                        const color = new THREE.Color(e.target.value);
                        window._dynamicUniforms[name] = { isColor: true, r: color.r, g: color.g, b: color.b };
                        applyDynamicUniformsToMaterials();
                    };
                    panel.appendChild(container);
                }
                panel.style.display = hasSliders ? 'flex' : 'none';
            }

                        function compileShader() {
                const code = editor.getValue();
                const needsUtils = !code.includes('float random');
                const commonSource = `precision mediump float;
uniform float u_time; uniform vec2 u_resolution; uniform vec3 u_lightDir; uniform vec3 u_viewDir;
uniform sampler2D u_tex0; uniform int u_bakeMode; uniform float u_seed;
varying vec2 vUvRaw;
#define vUv fract(vUvRaw)
${needsUtils ? UTILS.replace('uniform float u_seed;', '') : ''}
${code}`;

                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl');
                if (gl) {
                    gl.getExtension('OES_standard_derivatives');
                    const s = gl.createShader(gl.FRAGMENT_SHADER);
                    const rawSource = `#extension GL_OES_standard_derivatives : enable
${commonSource}`;
                    gl.shaderSource(s, rawSource);
                    gl.compileShader(s);
                    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
                        errorLog.innerText = "Error:\n" + gl.getShaderInfoLog(s);
                        errorLog.style.color = "#f48771"; return;
                    }
                }
                updateSliders(code);
                materials.forEach(m => { m.fragmentShader = commonSource; m.needsUpdate = true; });
                applyDynamicUniformsToMaterials();
                errorLog.innerText = "Compiled successfully at " + new Date().toLocaleTimeString();
                errorLog.style.color = "#89d185";
                try { 
                    const compressed = compressShader(code);
                    window.location.hash = compressed;
                    document.getElementById('compressed-size').innerText = `(${compressed.length}B)`;
                } catch(e) {}
            }

            exampleSelect.onchange = (e) => {
                const val = e.target.value;
                if(val !== 'default' && shaders[val]) {
                    textureNameInput.value = val; editor.setValue(shaders[val]);
                    compileShader(); showToast(`Loaded ${val}`, 'success');
                }
            };

            compileBtn.onclick = compileShader;
            saveBtn.onclick = () => {
                const name = textureNameInput.value.trim();
                if(!name) { showToast("Please enter a name", "error"); return; }
                saveCustomTexture(name, editor.getValue());
                showToast(`Saved "${name}"`, "success");
            };

            exportStorageBtn.onclick = () => {
                const data = localStorage.getItem(CUSTOM_STORAGE_KEY) || '{}';
                const blob = new Blob([data], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = 'texgen_backup.json'; a.click();
                showToast("Exported all", "success");
            };

            importStorageBtn.onclick = () => {
                const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
                input.onchange = (e) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            localStorage.setItem(CUSTOM_STORAGE_KEY, JSON.stringify(JSON.parse(e.target.result)));
                            showToast("Imported successfully!", "success");
                        } catch(err) { showToast("Import failed", "error"); }
                    };
                    reader.readAsText(e.target.files[0]);
                };
                input.click();
            };

            function openGallery(isCustom = false) {
                galleryTitle.innerText = isCustom ? "My Custom Textures" : "Example Gallery";
                galleryGrid.innerHTML = 'Loading...';
                galleryOverlay.style.display = 'flex';
                setTimeout(() => {
                    galleryGrid.innerHTML = '';
                    const items = isCustom ? getCustomTextures() : shaders;
                    const keys = Object.keys(items);
                    if(keys.length === 0) {
                        galleryGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #888; padding: 40px;">No textures saved.</div>';
                        return;
                    }
                    keys.forEach(name => {
                        const shaderData = isCustom ? items[name].code : items[name];
                        const item = document.createElement('div'); item.className = 'gallery-item';
                        const img = document.createElement('img');
                        try { 
                            const thumb = TextureEngine.bake(shaderData, 256, 256, 1.0);
                            img.src = thumb || ''; 
                        } catch(e) { console.error("Gallery Thumb Error:", e); }
                        const label = document.createElement('span'); label.innerText = name;
                        item.appendChild(img); item.appendChild(label);
                        if(isCustom) {
                            const del = document.createElement('button');
                            del.className = 'tool-btn danger'; del.innerText = 'Delete'; del.style.marginTop = '5px';
                            del.onclick = (e) => {
                                e.stopPropagation();
                                if(confirm(`Delete "${name}"?`)) { deleteCustomTexture(name); openGallery(true); }
                            };
                            item.appendChild(del);
                        }
                        item.onclick = () => {
                            textureNameInput.value = name; editor.setValue(shaderData);
                            compileShader(); galleryOverlay.style.display = 'none';
                        };
                        galleryGrid.appendChild(item);
                    });
                }, 50);
            }

            galleryBtn.onclick = () => openGallery(false);
            myTexturesBtn.onclick = () => openGallery(true);
            closeGallery.onclick = () => galleryOverlay.style.display = 'none';
            compressBtn.onclick = () => {
                navigator.clipboard.writeText(compressShader(editor.getValue()));
                showToast("Copied compressed!", "success");
            };
            
            bakeBtn.onclick = () => {
                const url = TextureEngine.bake(editor.getValue(), 1024, 1024, clock.getElapsedTime());
                const a = document.createElement('a'); a.download = 'preview.png'; a.href = url; a.click();
                showToast("Baked preview!", "success");
            };

            bakePbrBtn.onclick = async () => {
                showToast("Baking Texture Set...", "info");
                const zip = new JSZip();
                const code = editor.getValue();
                const engine = document.getElementById('engine-export-select').value;
                const rawMaps = {};
                for(let i=1; i<=5; i++) {
                    const dataUrl = TextureEngine.bake(code, 1024, 1024, 0, i);
                    if(dataUrl) {
                        const img = new Image(); img.src = dataUrl;
                        await new Promise(r => img.onload = r); rawMaps[i] = img;
                    }
                }
                const cvs = document.createElement('canvas'); cvs.width = 1024; cvs.height = 1024;
                const ctx = cvs.getContext('2d', { willReadFrequently: true });
                
                const packChannels = (rImg, gImg, bImg, aImg, defaultR=0, defaultG=0, defaultB=0, defaultA=255) => {
                    const outData = ctx.createImageData(1024, 1024);
                    const getImgData = (img) => {
                        if(!img) return null; ctx.drawImage(img, 0, 0);
                        return ctx.getImageData(0, 0, 1024, 1024).data;
                    };
                    const dR = getImgData(rImg), dG = getImgData(gImg), dB = getImgData(bImg), dA = getImgData(aImg);
                    for(let i=0; i<outData.data.length; i+=4) {
                        outData.data[i] = dR ? dR[i] : defaultR;
                        outData.data[i+1] = dG ? dG[i] : defaultG;
                        outData.data[i+2] = dB ? dB[i] : defaultB;
                        outData.data[i+3] = dA ? dA[i] : defaultA;
                    }
                    ctx.putImageData(outData, 0, 0);
                    return cvs.toDataURL().replace(/^data:image\/png;base64,/, "");
                };

                if (engine === 'raw') {
                    if(rawMaps[1]) zip.file('albedo.png', rawMaps[1].src.replace(/^data:image\/png;base64,/, ""), {base64: true});
                    if(rawMaps[2]) zip.file('normal.png', rawMaps[2].src.replace(/^data:image\/png;base64,/, ""), {base64: true});
                    if(rawMaps[3]) zip.file('roughness.png', rawMaps[3].src.replace(/^data:image\/png;base64,/, ""), {base64: true});
                    if(rawMaps[4]) zip.file('metallic.png', rawMaps[4].src.replace(/^data:image\/png;base64,/, ""), {base64: true});
                    if(rawMaps[5]) zip.file('ao.png', rawMaps[5].src.replace(/^data:image\/png;base64,/, ""), {base64: true});
                } else if (engine === 'unity') {
                    if(rawMaps[1]) zip.file('BaseColor.png', rawMaps[1].src.replace(/^data:image\/png;base64,/, ""), {base64: true});
                    if(rawMaps[2]) zip.file('NormalMap.png', rawMaps[2].src.replace(/^data:image\/png;base64,/, ""), {base64: true});
                    const maskData = ctx.createImageData(1024, 1024);
                    const met = rawMaps[4] ? (ctx.drawImage(rawMaps[4],0,0), ctx.getImageData(0,0,1024,1024).data) : null;
                    const ao = rawMaps[5] ? (ctx.drawImage(rawMaps[5],0,0), ctx.getImageData(0,0,1024,1024).data) : null;
                    const rough = rawMaps[3] ? (ctx.drawImage(rawMaps[3],0,0), ctx.getImageData(0,0,1024,1024).data) : null;
                    for(let i=0; i<maskData.data.length; i+=4) {
                        maskData.data[i] = met ? met[i] : 0;
                        maskData.data[i+1] = ao ? ao[i] : 255;
                        maskData.data[i+2] = 0;
                        maskData.data[i+3] = rough ? (255 - rough[i]) : 128;
                    }
                    ctx.putImageData(maskData, 0, 0);
                    zip.file('MaskMap.png', cvs.toDataURL().replace(/^data:image\/png;base64,/, ""), {base64: true});
                } else if (engine === 'unreal') {
                    if(rawMaps[1]) zip.file('BaseColor.png', rawMaps[1].src.replace(/^data:image\/png;base64,/, ""), {base64: true});
                    if(rawMaps[2]) zip.file('Normal.png', rawMaps[2].src.replace(/^data:image\/png;base64,/, ""), {base64: true});
                    const ormB64 = packChannels(rawMaps[5], rawMaps[3], rawMaps[4], null, 255, 128, 0);
                    zip.file('ORM.png', ormB64, {base64: true});
                }
                zip.generateAsync({type:"blob"}).then(function(content) {
                    const url = URL.createObjectURL(content);
                    const a = document.createElement('a'); a.download = 'texgen_material_set.zip'; a.href = url; a.click();
                    showToast("Downloaded Set!", "success");
                });
            };

            bakeSpritesBtn.onclick = () => {
                const frames = parseInt(prompt("Number of frames to bake?", "64")) || 64;
                const size = parseInt(prompt("Size per frame? (px)", "256")) || 256;
                const cols = Math.ceil(Math.sqrt(frames));
                const rows = Math.ceil(frames / cols);
                const canvas = document.createElement('canvas'); canvas.width = cols * size; canvas.height = rows * size;
                const ctx = canvas.getContext('2d');
                showToast(`Baking ${frames} frames...`, "info");
                const code = editor.getValue();
                let i = 0;
                function bakeNext() {
                    if (i >= frames) {
                        const a = document.createElement('a'); a.download = 'spritesheet.png'; a.href = canvas.toDataURL(); a.click();
                        showToast("Spritesheet saved!", "success"); return;
                    }
                    const dataUrl = TextureEngine.bake(code, size, size, (i / frames) * Math.PI * 2);
                    const img = new Image();
                    img.onload = () => {
                        ctx.drawImage(img, (i % cols) * size, Math.floor(i / cols) * size);
                        i++; bakeNext();
                    };
                    img.src = dataUrl;
                }
                bakeNext();
            };

            if (window.location.hash && window.location.hash.length > 1) {
                try {
                    const code = decompressShader(window.location.hash.substring(1));
                    if(code) { editor.setValue(code); showToast("Loaded from URL!", "success"); }
                    else { editor.setValue(shaders.island); }
                } catch(e) { editor.setValue(shaders.island); }
            } else { editor.setValue(shaders.island); }
            compileShader();
        };
    </script>
</body>
