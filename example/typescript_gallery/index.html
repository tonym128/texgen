<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TexGen TypeScript Gallery</title>
    <style>
      :root {
        --bg: #0f172a;
        --card: #1e293b;
        --accent: #22d3ee;
      }
      body {
        background: var(--bg);
        color: #f8fafc;
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 40px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 30px;
      }
      .card {
        background: var(--card);
        border-radius: 12px;
        padding: 20px;
        border: 1px solid #334155;
      }
      canvas, img {
        width: 100%;
        aspect-ratio: 1;
        background: #000;
        border-radius: 8px;
        margin-bottom: 15px;
      }
      h2 { color: var(--accent); margin-top: 0; }
      .badge {
        display: inline-block;
        padding: 4px 10px;
        background: rgba(34, 211, 238, 0.1);
        color: var(--accent);
        border-radius: 99px;
        font-size: 0.75rem;
        font-weight: bold;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <header style="margin-bottom: 40px;">
      <h1>TexGen <span style="font-weight: 300;">TypeScript Gallery</span></h1>
      <p>Demonstrating type-safe procedural generation, compression, and baking.</p>
    </header>
    <div id="app" class="grid"></div>

    <!-- Live Edit Modal -->
    <div id="modal-overlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 5000; backdrop-filter: blur(8px); justify-content: center; align-items: center; padding: 40px;">
      <div style="background: var(--card); border: 1px solid #334155; border-radius: 16px; width: 100%; max-width: 900px; display: grid; grid-template-columns: 1fr 1fr; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.5);">
        <div style="padding: 30px; border-right: 1px solid #334155; display: flex; flex-direction: column;">
          <h2 id="modal-title" style="margin-bottom: 5px;">Edit Shader</h2>
          <div id="modal-badge" class="badge">Live Edit</div>
          <div id="modal-display" style="flex-grow: 1; display: flex; align-items: center; justify-content: center;">
            <canvas id="modal-canvas" style="width: 100%; aspect-ratio: 1; border-radius: 8px;"></canvas>
          </div>
          <button class="badge" style="margin-top: 20px; cursor: pointer; border: 1px solid var(--accent); background: none;" onclick="document.getElementById('modal-overlay').style.display='none'">Close Editor</button>
        </div>
        <div style="padding: 30px; display: flex; flex-direction: column;">
          <strong style="display: block; margin-bottom: 10px; color: var(--accent);">GLSL Source</strong>
          <textarea id="modal-editor" spellcheck="false" style="flex-grow: 1; background: #0f172a; color: #94a3b8; border: 1px solid #334155; border-radius: 8px; padding: 15px; font-family: monospace; font-size: 0.85rem; resize: none; outline: none;"></textarea>
          <div id="modal-error" style="color: #f48771; font-size: 0.75rem; margin-top: 10px; display: none; white-space: pre-wrap;"></div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
