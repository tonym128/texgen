<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TexGen - Endless Flight Sim</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #loading {
            position: fixed; inset: 0; background: #050508;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000;
        }
        .spinner { width: 50px; height: 50px; border: 5px solid #333; border-top-color: #00ffcc; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .instructions {
            position: absolute; top: 20px; left: 20px; padding: 15px;
            background: rgba(0,0,0,0.6); border-radius: 8px; font-size: 0.8rem; pointer-events: none;
        }

        #tod-container { position: absolute; top: 20px; right: 20px; text-align: right; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; }
        input[type=range] { width: 120px; cursor: pointer; }

        /* Mobile Controls */
        #mobile-controls {
            position: absolute; bottom: 30px; left: 0; width: 100%;
            display: none; justify-content: space-between; padding: 0 30px; box-sizing: border-box;
            user-select: none; z-index: 2000;
        }
        .control-group { display: flex; gap: 15px; }
        .btn-circle {
            width: 70px; height: 70px; background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.5rem; font-weight: bold; color: #fff;
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        }
        .btn-circle:active { background: rgba(0, 255, 204, 0.4); border-color: #00ffcc; transform: scale(0.9); }

        @media (max-width: 768px) {
            #mobile-controls { display: flex; }
            .instructions { display: none; }
        }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <p id="compression-status">Initializing GPU...</p>
    </div>

    <div class="instructions">
        <strong>WASD / Arrows:</strong> Steer Plane<br>
        <strong>Textures:</strong> Realtime Sky & Seamless Baked Terrain
    </div>
    
    <div id="tod-container">
        <input type="range" id="tod-slider" min="0" max="1" step="0.001" value="0.5">
        <div style="font-size: 0.7rem; opacity: 0.7; margin-top: 4px;">Time of Day</div>
    </div>

    <div id="mobile-controls">
        <div class="control-group">
            <div class="btn-circle" id="btn-left">←</div>
            <div class="btn-circle" id="btn-right">→</div>
        </div>
        <div class="control-group">
            <div class="btn-circle" id="btn-up">↑</div>
            <div class="btn-circle" id="btn-down">↓</div>
        </div>
    </div>

    <canvas id="webgl-canvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="texgen.js"></script>
    <script src="game.js"></script>
</body>
</html>
