<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TexGen - Procedural Solitaire</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #eee;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #ui-bar {
            padding: 10px 20px;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .btn {
            padding: 8px 16px;
            background: #24283b;
            border: 1px solid #444;
            color: #fff;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn:hover { background: #00ffcc; color: #000; }

        #board {
            flex-grow: 1;
            position: relative;
        }

        #bg-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        .pile-slot {
            position: absolute;
            width: 80px; height: 112px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            box-sizing: border-box;
            z-index: 1;
            pointer-events: none;
        }

        .card {
            position: absolute;
            width: 80px; height: 112px;
            border-radius: 6px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            cursor: grab;
            user-select: none;
            box-sizing: border-box;
            transition: transform 0.15s ease-out, box-shadow 0.15s;
            z-index: 10;
        }

        .card.dragging {
            transition: none;
            z-index: 1000 !important;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.8);
            cursor: grabbing;
        }

        .card-inner {
            width: 100%; height: 100%;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 4px 6px;
            box-sizing: border-box;
            background-size: cover;
            border: 1px solid rgba(0,0,0,0.2);
        }

        .card.face-down .card-inner {
            /* Handled by JS background image */
        }
        .card.face-down .val, .card.face-down .suit, .card.face-down .center-suit { display: none; }

        .card.face-up .card-inner {
            /* Handled by JS background image */
        }

        .val { font-size: 18px; font-weight: bold; line-height: 1; }
        .suit { font-size: 16px; line-height: 1; }
        
        .card.red .val, .card.red .suit, .card.red .center-suit { color: #d00; }
        .card.black .val, .card.black .suit, .card.black .center-suit { color: #222; }

        .top-left { align-self: flex-start; text-align: center; }
        .bottom-right { align-self: flex-end; text-align: center; transform: rotate(180deg); }
        
        .center-suit {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            opacity: 0.2;
            pointer-events: none;
        }

        #victory-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 5000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #victory-overlay h1 {
            font-size: 4rem;
            color: #00ffcc;
            text-shadow: 0 0 20px rgba(0,255,204,0.5);
        }
    </style>
</head>
<body>

    <div id="ui-bar">
        <div>Procedural Solitaire (Klondike)</div>
        <button class="btn" onclick="game.startNewGame()">New Game</button>
    </div>

    <div id="board">
        <canvas id="bg-canvas"></canvas>
        <div id="slots-container"></div>
        <div id="cards-container"></div>
    </div>

    <div id="victory-overlay">
        <h1>YOU WIN!</h1>
        <button class="btn" onclick="game.startNewGame()" style="font-size: 1.2rem;">Play Again</button>
    </div>

    <script src="texgen.js"></script>
    <script src="game.js"></script>
</body>
</html>
