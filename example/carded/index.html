<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Carded - P2P WebRTC Card Game Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; -webkit-user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; }
        #ui-layer > * { pointer-events: auto; }
        
        .panel { background: rgba(0, 0, 0, 0.85); border: 1px solid #444; border-radius: 8px; padding: 20px; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
        
        #lobby { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 320px; }
        #lobby h1 { margin: 0 0 10px 0; color: #0f8; font-size: 32px; text-transform: uppercase; letter-spacing: 2px; }
        #lobby p { color: #aaa; font-size: 14px; margin-bottom: 20px; }
        input[type="text"] { width: calc(100% - 24px); padding: 10px; margin-bottom: 10px; background: #222; border: 1px solid #555; color: #fff; border-radius: 4px; font-size: 16px; }
        button { width: 100%; padding: 12px; margin-bottom: 10px; background: #0f8; color: #000; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #0c6; }
        button.secondary { background: #444; color: #fff; }
        button.secondary:hover { background: #555; }
        
        #hud { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        #top-bar { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; align-items: flex-start; }
        #game-info { font-size: 14px; color: #0f8; text-shadow: 1px 1px 2px #000; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 4px; }
        #host-info { font-size: 14px; text-align: right; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 4px; }
        
        #controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; }
        #controls button { width: auto; padding: 10px 20px; margin: 0; font-size: 14px; }
        
        #db-controls { position: absolute; bottom: 10px; right: 10px; display: flex; gap: 10px; }
        #db-controls button { width: auto; padding: 6px 12px; font-size: 12px; margin: 0; background: #333; color: #ddd; }
        #db-controls button:hover { background: #555; }

        #history-panel { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; max-width: 600px; max-height: 80%; overflow-y: auto; }
        #history-panel h2 { margin-top: 0; color: #0f8; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #444; font-size: 14px; }
        th { color: #888; font-weight: normal; }
        
        #notification { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background: rgba(0, 0, 0, 0.85); 
            border: 2px solid #0f8;
            color: #0f8; 
            padding: 30px 50px; 
            border-radius: 12px; 
            font-size: 24px;
            font-weight: bold; 
            text-align: center;
            display: none; 
            z-index: 1000;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
            pointer-events: none;
        }

        /* Mobile controls fallback */
        #mobile-dpad { display: none; position: absolute; bottom: 20px; left: 20px; width: 150px; height: 150px; }
        @media (pointer: coarse) { #mobile-dpad { display: block; } }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="lobby" class="panel">
            <h1>Carded</h1>
            <p>P2P WebRTC Card Game Engine</p>
            <input type="text" id="player-name" placeholder="Your Name" value="Player">
            <button id="btn-host">Host New Game</button>
            <div style="margin: 15px 0; color: #666; font-size: 12px; text-transform: uppercase;">or join existing</div>
            <input type="text" id="host-id" placeholder="Host ID">
            <button id="btn-join" class="secondary">Join Game</button>
        </div>

        <div id="hud">
            <div id="top-bar">
                <div id="game-info">
                    <div id="status-text">Waiting in lobby...</div>
                    <div id="players-list" style="margin-top: 5px; font-size: 12px; color: #ddd;"></div>
                </div>
                <div id="host-info">
                    <div>Room ID: <span id="room-id-display" style="color:#0f8; font-family:monospace;">---</span></div>
                    <div id="db-status" style="font-size: 11px; color: #888; margin-top: 4px;">SQLite: Uninitialized</div>
                </div>
            </div>

            <div id="controls">
                <!-- Dynamic game controls injected here -->
            </div>

            <div id="db-controls">
                <button id="btn-view-history">View History</button>
                <button id="btn-export-db">Export DB</button>
                <input type="file" id="import-db-file" style="display:none;" accept=".sqlite,.db">
                <button id="btn-import-db" style="display:none;">Import DB</button> <!-- Only host can import -->
            </div>

            <div id="history-panel" class="panel">
                <h2>Game History</h2>
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <button id="tab-scoreboard" class="secondary">Scoreboard</button>
                    <button id="tab-players" class="secondary">Players</button>
                    <button id="tab-games" class="secondary">Matches</button>
                </div>
                <div id="history-filters" style="margin-bottom: 10px; display: none;">
                    <label for="history-date" style="font-size: 14px;">Date: </label>
                    <input type="date" id="history-date" style="background:#222; color:#fff; border:1px solid #555; padding:5px;">
                </div>
                <div id="history-content"></div>
                <button id="btn-close-history" style="margin-top: 15px;">Close</button>
            </div>
        </div>
        
        <div id="notification"></div>
    </div>

    <!-- Dependencies -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://ga.jspm.io/npm:three@0.160.0/build/three.module.js",
                "three/addons/": "https://ga.jspm.io/npm:three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <script src="texgen.js"></script>
    <script src="texgen.words.js"></script>
    <script type="module" src="game.js"></script>
</body>
</html>
