<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TexGen Platformer Ultimate</title>
    <style>
        :root { --ui-bg: rgba(0, 0, 0, 0.8); --text: #fff; --accent: #00ffcc; }
        body { margin: 0; background-color: #000; color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; }
        
        #game-container { position: relative; width: 800px; height: 600px; overflow: hidden; background: #111; box-shadow: 0 0 20px rgba(0,0,0,1); }
        canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--ui-bg); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .overlay.active { display: flex; }
        
        h1 { color: var(--accent); font-size: 48px; text-shadow: 0 0 10px var(--accent); margin-bottom: 20px; text-align: center; }
        h2 { color: #aaa; margin-top: 0; }
        
        button { background: transparent; color: var(--text); border: 2px solid var(--accent); padding: 10px 20px; font-size: 20px; margin: 10px; cursor: pointer; transition: all 0.2s; border-radius: 5px; width: 250px; text-transform: uppercase; letter-spacing: 2px; z-index: 11;}
        button:hover { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }
        
        .slot-btn { display: flex; justify-content: space-between; width: 400px; text-align: left; }
        .slot-empty { color: #666; font-style: italic; }
        
        .hud { position: absolute; top: 0; left: 0; z-index: 5; pointer-events: none; width: 100%; height: 60px; display: none; flex-direction: column; align-items: center; padding: 5px 20px; box-sizing: border-box; font-size: 20px; font-weight: bold; text-shadow: 2px 2px 0 #000; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); }
        .hud-row { display: flex; justify-content: space-between; width: 100%; align-items: center; }
        
        #progress-container { width: 300px; height: 12px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 6px; overflow: hidden; margin-top: 5px; pointer-events: none; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.1s; }
        .progress-label { display: flex; justify-content: space-between; width: 300px; font-size: 12px; margin-top: 2px; }
        
        /* Map specific */
        .map-node { width: 30px; height: 30px; border-radius: 50%; background: #333; border: 3px solid #666; position: absolute; transform: translate(-50%, -50%); cursor: pointer; transition: all 0.2s;}
        .map-node.unlocked { background: #555; border-color: #fff; }
        .map-node.current { background: var(--accent); border-color: #fff; box-shadow: 0 0 15px var(--accent); transform: translate(-50%, -50%) scale(1.2); }
        .map-player { width: 32px; height: 32px; position: absolute; transform: translate(-50%, -100%); transition: all 0.5s ease-in-out; pointer-events: none; z-index: 12; }
        .map-path { position: absolute; background: #555; height: 4px; transform-origin: left center; z-index: -1; }
        #map-container { position: relative; width: 600px; height: 400px; margin-top: 20px; border: 2px solid #444; background: #1a1a1a; }
        
        /* Leaderboard */
        table { width: 400px; border-collapse: collapse; margin-bottom: 20px; }
        th, td { padding: 10px; border-bottom: 1px solid #444; text-align: left; font-size: 18px; }
        th { color: var(--accent); }
        
        #loading { position: absolute; font-size: 32px; font-weight: bold; color: var(--accent); animation: pulse 1s infinite alternate; z-index: 200; }
        @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }
        #transition-swipe { position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: #000; z-index: 100; pointer-events: none; transition: left 0.5s ease-in-out; }
    </style>
</head>
<body>
    <div id="loading">Generating Textures...</div>
    
    <div id="game-container">
        <div id="transition-swipe"></div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="hud" class="hud">
            <div class="hud-row">
                <div id="hud-score">Score: 0</div>
                <div id="hud-rings" style="color: #ffd700;">Rings: 0</div>
                <div id="hud-powerup" style="color: var(--accent);"></div>
                <div id="hud-lives">Lives: 3</div>
            </div>
            <div id="progress-container">
                <div id="progress-bar"></div>
            </div>
            <div class="progress-label">
                <span>START</span>
                <span>FINISH</span>
            </div>
        </div>

        <!-- Main Menu -->
        <div id="menu-main" class="overlay">
            <h1>TexGen Platformer</h1>
            <button onclick="ui.showMenu('menu-saveload', {mode: 'load'})">Play Game</button>
            <button onclick="ui.showMenu('menu-leaderboard')">Leaderboard</button>
        </div>

        <!-- Save / Load Menu -->
        <div id="menu-saveload" class="overlay">
            <h1 id="saveload-title">Select Slot</h1>
            <div id="slots-container"></div>
            <button onclick="ui.showMenu('menu-main')" style="margin-top: 30px;">Back</button>
        </div>

        <!-- World Map -->
        <div id="menu-map" class="overlay">
            <div id="map-container">
                <img id="map-character" class="map-player" src="" style="display: none;">
            </div>
            <button onclick="ui.showMenu('menu-saveload', {mode: 'save'})" style="margin-top: 20px;">Save Game</button>
            <button onclick="ui.showMenu('menu-main')">Main Menu</button>
        </div>

        <!-- Leaderboard -->
        <div id="menu-leaderboard" class="overlay">
            <h1>Leaderboard</h1>
            <table>
                <thead><tr><th>Rank</th><th>Name</th><th>Score</th></tr></thead>
                <tbody id="leaderboard-body"></tbody>
            </table>
            <button onclick="ui.showMenu('menu-main')">Back</button>
        </div>
        
        <!-- Game Over / Level Complete -->
        <div id="menu-result" class="overlay">
            <h1 id="result-title">Level Complete!</h1>
            <h2 id="result-score">Score: 1000</h2>
            <button id="btn-result-next" onclick="game.goToMap()">Continue</button>
        </div>
    </div>

    <!-- Include TexGen library -->
    <script src="texgen.js"></script>
    <script src="game.js"></script>
    <script>
        // Resize logic to handle full screen
        function resize() {
            const container = document.getElementById('game-container');
            const ww = window.innerWidth;
            const wh = window.innerHeight;
            const scale = Math.min(ww / 800, wh / 600);
            container.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
