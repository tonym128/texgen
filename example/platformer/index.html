<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TexGen - Ultimate Platformer</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: #000; }
        canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }
        
        #ui { position: absolute; top: 20px; left: 20px; z-index: 100; font-weight: bold; text-shadow: 2px 2px 4px #000; }
        #progress-bar { width: 200px; height: 10px; background: rgba(255,255,255,0.2); border-radius: 5px; margin-top: 10px; overflow: hidden; border: 1px solid #000; }
        #progress-fill { height: 100%; background: #00ffcc; width: 0%; transition: width 0.3s; }

        #screens { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.7); z-index: 500; backdrop-filter: blur(5px); }
        .screen { text-align: center; }
        .btn { padding: 15px 40px; background: #00ffcc; color: #000; border: none; border-radius: 8px; font-weight: bold; font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .btn:hover { transform: scale(1.1); }

        /* Mobile Controls */
        #mobile-controls {
            position: absolute; bottom: 40px; left: 0; width: 100%;
            display: none; justify-content: space-between; padding: 0 40px; box-sizing: border-box;
            user-select: none; z-index: 1000;
        }
        .btn-circle {
            width: 80px; height: 80px; background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 2rem; color: #fff; backdrop-filter: blur(5px);
        }
        .btn-circle:active { background: rgba(0, 255, 204, 0.5); transform: scale(0.9); }

        @media (max-width: 768px) { #mobile-controls { display: flex; } }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        
        <div id="ui">
            <div id="stats">LEVEL 1 - LIVES: 10</div>
            <div id="progress-bar"><div id="progress-fill"></div></div>
        </div>

        <div id="mobile-controls">
            <div style="display: flex; gap: 20px;">
                <div class="btn-circle" id="btn-left">←</div>
                <div class="btn-circle" id="btn-right">→</div>
            </div>
            <div class="btn-circle" id="btn-jump" style="background: rgba(0, 255, 204, 0.2);">▲</div>
        </div>

        <div id="screens">
            <div id="start-screen" class="screen">
                <h1 style="font-size: 3rem; color: #00ffcc;">TexGen Platformer</h1>
                <p>A procedural 2D adventure.</p>
                <button class="btn" onclick="game.startFirstLevel()">START GAME</button>
            </div>
            <div id="win-screen" class="screen" style="display: none;">
                <h1 style="color: #00ffcc;">STAGE CLEAR!</h1>
                <button class="btn" onclick="game.nextLevel()">NEXT LEVEL</button>
            </div>
        </div>
    </div>

    <script src="texgen.js"></script>
    <script src="game.js"></script>
</body>
</html>
