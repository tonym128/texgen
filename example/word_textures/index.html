<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TexGen Words - Natural Language Textures</title>
    <script src="../../texgen.js"></script>
    <script src="../../src/texgen.words.js"></script>
    <style>
        :root {
            --sidebar-width: 300px;
            --primary: #007aff;
            --bg: #1a1a1a;
            --surface: #222;
            --border: #333;
            --text: #eee;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Sidebar Styles */
        #sidebar {
            width: var(--sidebar-width);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header h2 { margin: 0; font-size: 1.2rem; }
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .keyword-group {
            margin-bottom: 20px;
        }
        .keyword-group h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 8px;
            padding-left: 5px;
        }
        .keyword-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            border-radius: 6px;
            margin-bottom: 2px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .keyword-item:hover {
            background: #333;
        }
        .keyword-name {
            font-family: monospace;
            font-size: 0.9rem;
            color: var(--primary);
        }
        .keyword-example {
            font-size: 0.7rem;
            color: #888;
            background: #111;
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* Main Content Styles */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            padding: 20px;
            gap: 20px;
        }
        header {
            text-align: center;
        }
        .canvas-container {
            position: relative;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
            width: 512px;
            height: 512px;
            flex-shrink: 0;
        }
        canvas {
            display: block;
        }
        .controls {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .input-group {
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #333;
            color: #fff;
            font-size: 18px;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: var(--primary);
        }
        .input-group button {
            padding: 12px 25px;
            border-radius: 8px;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .input-group button:hover {
            opacity: 0.8;
        }
        .examples {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .example-btn {
            background: #333;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 13px;
            cursor: pointer;
        }
        .example-btn:hover {
            background: #444;
        }
        .debug-shader {
            width: 100%;
            max-width: 800px;
            background: #000;
            color: #0f0;
            padding: 15px;
            font-family: monospace;
            font-size: 12px;
            border-radius: 8px;
            white-space: pre-wrap;
            display: none;
            margin-bottom: 20px;
        }
        
        @media (max-width: 900px) {
            body { flex-direction: column; overflow: auto; height: auto; }
            #sidebar { width: 100%; height: 300px; border-right: none; border-bottom: 1px solid var(--border); }
            .canvas-container { width: 300px; height: 300px; }
        }
    </style>
</head>
<body>
    <aside id="sidebar">
        <div class="sidebar-header">
            <h2>Keywords</h2>
            <input type="text" id="keyword-search" placeholder="Search keywords..." style="width: 100%; margin-top: 10px; padding: 8px; border-radius: 4px; border: 1px solid #444; background: #333; color: #fff; box-sizing: border-box; outline: none;">
        </div>
        <div class="sidebar-content" id="sidebar-content">
            <!-- Populated by JS -->
        </div>
    </aside>

    <main>
        <header>
            <h1>TexGen Words</h1>
            <p>Type a sentence to create a texture. Double-click canvas for GLSL.</p>
        </header>

        <div class="canvas-container">
            <canvas id="output"></canvas>
        </div>

        <div class="controls">
            <div class="input-group">
                <input type="text" id="sentence-input" placeholder="e.g. blue noise circle mix rotate seed:42" value="blue noise circle mix rotate seed:42">
                <button id="generate-btn">Generate</button>
                <button id="random-btn" style="background: #28a745;">Random</button>
                <button id="gallery-btn" style="background: #ff9500;">Random Gallery</button>
            </div>

            <div style="display: flex; align-items: center; gap: 10px; background: #222; padding: 10px 15px; border-radius: 8px; border: 1px solid #333;">
                <label for="seed-slider" style="font-weight: bold; color: #aaa; font-size: 14px; min-width: 50px;">Seed:</label>
                <input type="range" id="seed-slider" min="1" max="100" step="1" value="42" style="flex: 1; cursor: pointer;">
                <span id="seed-display" style="font-family: monospace; color: var(--primary); font-size: 16px; min-width: 30px; text-align: right;">42</span>
            </div>

            <div class="examples">
                <span class="example-btn" data-s="red white checker tile rotate">Red White Checker</span>
                <span class="example-btn" data-s="fire smoke lava mix">Lava Fire</span>
                <span class="example-btn" data-s="blue water ripple fbm">Water Ripples</span>
                <span class="example-btn" data-s="gold shiny star mirror">Golden Star</span>
                <span class="example-btn" data-s="swirl glitch retro box red digital">Digital Glitch</span>
                <span class="example-btn" data-s="marble stone blue metal repeat grid">Blue Marble</span>
                <span class="example-btn" data-s="purple aura energy pulse">Energy Pulse</span>
                <span class="example-btn" data-s="cyan plasma neon glow">Neon Plasma</span>
                <span class="example-btn" data-s="flower pink green leaf center">Pink Flower</span>
                <span class="example-btn" data-s="sun yellow orange hot aura">Burning Sun</span>
                <span class="example-btn" data-s="green matrix digital pulse blur">Matrix Code</span>
                <span class="example-btn" data-s="liquid gear ceil">Molten Machinery</span>
            </div>
        </div>

        <div id="debug" class="debug-shader"></div>
    </main>

    <div id="gallery-modal" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.95); z-index:100; overflow-y:auto; padding:20px; box-sizing:border-box;">
        <button id="close-gallery-btn" style="position:fixed; top:20px; right:20px; z-index:101; background:#f00; color:#fff; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:bold;">Close Gallery</button>
        <div id="gallery-grid" style="display:flex; flex-wrap:wrap; gap:20px; justify-content:center; max-width:1200px; margin:0 auto; padding-top:40px;"></div>
        <div id="gallery-loader" style="text-align:center; padding:40px; color:#aaa; width:100%;">Scrolling to generate more...</div>
    </div>

    <div id="editor-modal" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.98); z-index:200; overflow-y:auto; padding:20px; box-sizing:border-box; color: #fff;">
        <button id="close-editor-btn" style="position:fixed; top:20px; right:20px; z-index:201; background:#f00; color:#fff; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:bold;">Close Editor</button>
        <div style="max-width:1200px; margin:0 auto; padding-top:40px; text-align:center;">
            <h2 id="editor-sentence-title" style="color: var(--primary); font-family: monospace; margin-bottom: 20px;"></h2>
            
            <div style="display:flex; justify-content:center; margin-bottom: 40px; gap: 40px; align-items: center;">
                <div style="text-align:center;">
                    <img id="editor-main-img" width="256" height="256" style="border-radius:8px; border:2px solid #555;">
                    <div id="editor-main-seed" style="margin-top:10px; color:#aaa; font-family:monospace;"></div>
                </div>
            </div>

            <h3 style="border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px;">Seeds 1 - 100</h3>
            <div id="editor-seeds-grid" style="display:flex; flex-wrap:wrap; gap:15px; justify-content:center;"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('output');
        const input = document.getElementById('sentence-input');
        const btn = document.getElementById('generate-btn');
        const debugEl = document.getElementById('debug');
        const sidebarContent = document.getElementById('sidebar-content');
        const seedSlider = document.getElementById('seed-slider');
        const seedDisplay = document.getElementById('seed-display');

        const tg = new TexGen({ canvas: canvas, width: 512, height: 512 });
        const parser = new TexGen.Words();

        function generate() {
            const sentence = input.value;
            const result = parser.parse(sentence);
            
            tg.width = result.width;
            tg.height = result.height;
            if (result.seed !== null) {
                tg.seed = result.seed;
                seedSlider.value = result.seed;
                seedDisplay.textContent = result.seed;
            } else {
                // If no seed in sentence, keep current global seed but ensure slider matches it (or generates a random one if we want)
                seedSlider.value = Math.floor(tg.seed);
                seedDisplay.textContent = Math.floor(tg.seed);
            }

            try {
                tg.bake(result.shader);
                debugEl.textContent = result.shader;
            } catch (e) {
                console.error(e);
            }
        }

        seedSlider.addEventListener('input', (e) => {
            const newSeed = e.target.value;
            seedDisplay.textContent = newSeed;
            tg.seed = parseInt(newSeed);
            
            // Sync input text by updating or appending the seed modifier
            let currentText = input.value;
            if (/seed:\d+/.test(currentText)) {
                currentText = currentText.replace(/seed:\d+/, `seed:${newSeed}`);
            } else {
                currentText = currentText.trim() + ` seed:${newSeed}`;
            }
            input.value = currentText;
            
            // Re-generate to ensure parsing picks up other changes if any
            generate();
        });

        // Simplest Example Helper
        function getSimpleExample(word, category) {
            switch(category) {
                case 'COLORS': return word;
                case 'SHAPES': return `white ${word}`;
                case 'GENERATORS': return word;
                case 'OPERATIONS': return `white noise ${word}`;
                case 'MODIFIERS': return `white box ${word}`;
                case 'SPATIAL': return `checker ${word}`;
                case 'MATERIALS': return word;
                case 'FLOW': return `white ${word} noise`;
                default: return word;
            }
        }

        // Categorized Words (based on 32-word blocks in src)
        const categories = [
            { name: 'COLORS', start: 0, end: 32 },
            { name: 'SHAPES', start: 32, end: 64 },
            { name: 'GENERATORS', start: 64, end: 96 },
            { name: 'OPERATIONS', start: 96, end: 128 },
            { name: 'MODIFIERS', start: 128, end: 160 },
            { name: 'SPATIAL', start: 160, end: 192 },
            { name: 'MATERIALS', start: 192, end: 224 },
            { name: 'FLOW', start: 224, end: 256 }
        ];

        const allWords = Object.keys(parser.words);
        
        categories.forEach(cat => {
            const group = document.createElement('div');
            group.className = 'keyword-group';
            const h3 = document.createElement('h3');
            h3.textContent = cat.name;
            group.appendChild(h3);

            for (let i = cat.start; i < cat.end; i++) {
                const word = allWords[i];
                if (!word) continue;
                
                // Clean up aliases/special names for display
                const displayName = word.replace(/_(mat|spatial|mod)$/, '');
                const example = getSimpleExample(displayName, cat.name);

                const item = document.createElement('div');
                item.className = 'keyword-item';
                item.innerHTML = `<span class="keyword-name">${displayName}</span><span class="keyword-example">${example}</span>`;
                item.onclick = () => {
                    input.value = example;
                    generate();
                };
                group.appendChild(item);
            }
            sidebarContent.appendChild(group);
        });

        btn.onclick = generate;
        input.onkeypress = (e) => { if (e.key === 'Enter') generate(); };

        document.querySelectorAll('.example-btn').forEach(btn => {
            btn.onclick = () => {
                input.value = btn.dataset.s;
                generate();
            };
        });

        const keywordSearch = document.getElementById('keyword-search');
        keywordSearch.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.keyword-group').forEach(group => {
                let hasVisible = false;
                group.querySelectorAll('.keyword-item').forEach(item => {
                    const name = item.querySelector('.keyword-name').textContent.toLowerCase();
                    if (name.includes(term)) {
                        item.style.display = 'flex';
                        hasVisible = true;
                    } else {
                        item.style.display = 'none';
                    }
                });
                group.style.display = hasVisible ? 'block' : 'none';
            });
        });

        // Initial generation
        generate();

        // Animation loop
        function animate(time) {
            const result = parser.parse(input.value);
            tg.render(time * 0.001);
            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);

        canvas.ondblclick = () => {
            debugEl.style.display = debugEl.style.display === 'none' ? 'block' : 'none';
        };

        // Random Gallery Logic
        const galleryBtn = document.getElementById('gallery-btn');
        const galleryModal = document.getElementById('gallery-modal');
        const closeGalleryBtn = document.getElementById('close-gallery-btn');
        const galleryGrid = document.getElementById('gallery-grid');
        const galleryLoader = document.getElementById('gallery-loader');
        
        const editorModal = document.getElementById('editor-modal');
        const closeEditorBtn = document.getElementById('close-editor-btn');
        const editorSentenceTitle = document.getElementById('editor-sentence-title');
        const editorMainImg = document.getElementById('editor-main-img');
        const editorMainSeed = document.getElementById('editor-main-seed');
        const editorSeedsGrid = document.getElementById('editor-seeds-grid');
        
        let isLoadingGallery = false;
        let isEditorOpen = false;

        async function openEditor(sentence, originalSeed, originalDataUrl) {
            isEditorOpen = true;
            editorModal.style.display = 'block';
            editorSentenceTitle.textContent = sentence;
            editorMainImg.src = originalDataUrl;
            editorMainSeed.textContent = "Original Seed: " + originalSeed.toFixed(2);
            
            editorSeedsGrid.innerHTML = ''; // clear grid
            
            let matchCount = 0;

            // Generate seeds 1 - 100
            for (let i = 1; i <= 100; i++) {
                if (!isEditorOpen) break; // stop if closed

                const result = parser.parse(`${sentence} seed:${i}`);
                
                const itemDiv = document.createElement('div');
                itemDiv.style.cssText = 'background:#222; padding:5px; border-radius:4px; display:flex; flex-direction:column; align-items:center; width:80px;';
                
                const img = document.createElement('img');
                img.width = 64;
                img.height = 64;
                img.style.borderRadius = '4px';
                img.style.background = '#000';
                img.style.marginBottom = '4px';
                
                const label = document.createElement('div');
                label.style.cssText = 'font-size:0.6rem; color:#aaa; font-family:monospace;';
                label.textContent = `seed:${i}`;

                itemDiv.appendChild(img);
                itemDiv.appendChild(label);
                editorSeedsGrid.appendChild(itemDiv);

                try {
                    let dataUrl;
                    if (TexGen.bakeAsync) {
                        dataUrl = await TexGen.bakeAsync(result.shader, { width: 64, height: 64, seed: result.seed !== null ? result.seed : i });
                    } else {
                        const tempTg = new TexGen({ width: 64, height: 64 });
                        dataUrl = tempTg.bake(result.shader);
                    }
                    if (dataUrl && isEditorOpen) {
                        img.src = dataUrl;
                        
                        // To properly compare, we need to ensure the originalDataUrl is also 64x64, 
                        // but since the original is 128x128, we should compare the first 5 generated images to each other
                        // or just generate the original at 64x64. Let's compare them to the first generated image.
                        if (i === 1) {
                            itemDiv._firstDataUrl = dataUrl;
                        } else if (i <= 5) {
                            const firstItem = editorSeedsGrid.children[0];
                            if (firstItem && firstItem._firstDataUrl === dataUrl) {
                                matchCount++;
                            }
                        }
                        
                        if (i === 5 && matchCount === 4) { // All first 5 are identical (1 + 4 matches)
                            const info = document.createElement('div');
                            info.style.cssText = 'width: 100%; text-align: center; color: #888; padding: 20px;';
                            info.textContent = 'Texture does not use randomness. Stopped generating duplicate seeds.';
                            editorSeedsGrid.appendChild(info);
                            break;
                        }
                    }
                } catch(e) {
                    console.error("Editor generation error", e);
                    itemDiv.remove();
                }
            }
        }

        closeEditorBtn.onclick = () => {
            editorModal.style.display = 'none';
            isEditorOpen = false;
        };

        function getRandomSentence() {
            const keys = Object.keys(parser.words);
            const validKeys = keys.filter(k => !k.endsWith('_mat') && !k.endsWith('_spatial') && !k.endsWith('_mod'));
            // Try to make slightly structured random sentences: color + shape + generator + modifier
            const colors = categories.find(c => c.name === 'COLORS');
            const shapes = categories.find(c => c.name === 'SHAPES');
            const generators = categories.find(c => c.name === 'GENERATORS');
            const modifiers = categories.find(c => c.name === 'MODIFIERS');
            
            let sentence = [];
            const numWords = Math.floor(Math.random() * 3) + 3; // 3 to 5 words
            for (let i = 0; i < numWords; i++) {
                sentence.push(validKeys[Math.floor(Math.random() * validKeys.length)]);
            }
            return sentence.join(' ');
        }

        const randomBtn = document.getElementById('random-btn');
        randomBtn.onclick = () => {
            input.value = getRandomSentence();
            generate();
        };

        async function loadGalleryImages(count = 10) {
            if (isLoadingGallery) return;
            isLoadingGallery = true;
            for (let i = 0; i < count; i++) {
                const sentence = getRandomSentence();
                const result = parser.parse(sentence);
                
                const itemDiv = document.createElement('div');
                itemDiv.style.cssText = 'background:#222; padding:10px; border-radius:8px; display:flex; flex-direction:column; align-items:center; width:148px; cursor:pointer; border:1px solid #333; transition:transform 0.2s, border-color 0.2s;';
                itemDiv.onmouseover = () => { itemDiv.style.transform = 'scale(1.05)'; itemDiv.style.borderColor = '#007aff'; };
                itemDiv.onmouseout = () => { itemDiv.style.transform = 'scale(1)'; itemDiv.style.borderColor = '#333'; };
                
                const img = document.createElement('img');
                img.width = 128;
                img.height = 128;
                img.style.borderRadius = '4px';
                img.style.marginBottom = '8px';
                img.style.background = '#000';
                
                const label = document.createElement('div');
                label.style.cssText = 'font-size:0.7rem; color:#aaa; text-align:center; word-break:break-word; line-height:1.2;';
                label.textContent = sentence;

                itemDiv.appendChild(img);
                itemDiv.appendChild(label);
                galleryGrid.appendChild(itemDiv);

                let seedToUse = result.seed !== null ? result.seed : Math.random()*100;

                itemDiv.onclick = () => {
                    openEditor(sentence, seedToUse, img.src);
                };

                // Use async bake if available to avoid freezing UI
                try {
                    let dataUrl;
                    if (TexGen.bakeAsync) {
                        dataUrl = await TexGen.bakeAsync(result.shader, { width: 128, height: 128, seed: seedToUse });
                    } else {
                        const tempTg = new TexGen({ width: 128, height: 128 });
                        dataUrl = tempTg.bake(result.shader);
                    }
                    if (dataUrl) {
                        img.src = dataUrl;
                    } else {
                        throw new Error("No dataUrl returned");
                    }
                } catch(e) {
                    console.error("Gallery generation error", e);
                    itemDiv.remove();
                    i--; // Try again to fulfill the count
                }
            }
            isLoadingGallery = false;
        }

        galleryBtn.onclick = () => {
            galleryModal.style.display = 'block';
            if (galleryGrid.children.length === 0) {
                loadGalleryImages(100);
            }
        };

        closeGalleryBtn.onclick = () => {
            galleryModal.style.display = 'none';
        };

        // Infinite Scroll using IntersectionObserver
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && galleryModal.style.display === 'block') {
                loadGalleryImages(20);
            }
        }, { root: galleryModal, rootMargin: '400px' });
        
        observer.observe(galleryLoader);

    </script>
</body>
</html>
